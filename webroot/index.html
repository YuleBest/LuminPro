<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LuminPro</title>
  <link rel="stylesheet" type="text/css" href="/internal/insets.css" />
  <script type="module" crossorigin src="/assets/index-_esaoEhK.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CRYvfSfT.css">
</head>

<body>
  <div id="app">
    <!-- 顶部头 -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-icon"><i data-lucide="sun"></i></div>
        <div class="header-text">
          <h1>LuminPro</h1>
          <p class="header-subtitle" id="module-version">日用屏幕亮度强化</p>
        </div>
      </div>
      <div class="header-status" id="module-status">
        <span class="status-dot"></span>
        <span class="status-text">运行中</span>
      </div>
    </header>

    <!-- 配置卡片 -->
    <section class="card" id="config-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="settings"></i></span>
        <h2>亮度配置</h2>
      </div>

      <div class="config-item">
        <div class="config-label">
          <span class="config-name">前台最大亮度</span>
          <span class="config-desc">触发亮度提升的阈值</span>
        </div>
        <div class="config-value">
          <input type="number" id="input-ui-max-bri" class="config-input" min="0" />
        </div>
      </div>

      <div class="config-item">
        <div class="config-label">
          <span class="config-name">峰值最大亮度</span>
          <span class="config-desc">亮度提升的目标值</span>
        </div>
        <div class="config-value">
          <input type="number" id="input-max-bri" class="config-input" min="0" />
        </div>
      </div>

      <div class="config-item">
        <div class="config-label">
          <span class="config-name">休眠时间</span>
          <span class="config-desc">该时段内不提升亮度</span>
        </div>
        <div class="config-value">
          <input type="text" id="input-sleep-time" class="config-input config-input-wide"
            placeholder="如 1900-0600" />
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-primary" id="btn-save">
          <span class="btn-icon"><i data-lucide="save"></i></span> 保存配置
        </button>
      </div>
    </section>

    <!-- 实时状态 -->
    <section class="card" id="status-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="activity"></i></span>
        <h2>实时状态</h2>
        <button class="btn-icon-only" id="btn-refresh-status" title="刷新"><i data-lucide="refresh-cw"></i></button>
      </div>

      <div class="status-grid">
        <div class="status-item">
          <span class="status-label">当前亮度</span>
          <span class="status-value" id="status-current-bri">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">系统最大亮度</span>
          <span class="status-value" id="status-sys-max-bri">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">inotifyd PID</span>
          <span class="status-value" id="status-inotifyd-pid">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">休眠状态</span>
          <span class="status-value" id="status-sleep">—</span>
        </div>
      </div>
    </section>

    <!-- 日志 -->
    <section class="card" id="log-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="file-text"></i></span>
        <h2>运行日志</h2>
        <button class="btn-icon-only" id="btn-refresh-log" title="刷新"><i data-lucide="refresh-cw"></i></button>
      </div>
      <pre class="log-output" id="log-output">加载中...</pre>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

</body>

</html>
