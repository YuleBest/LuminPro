name: Build & Package Module

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. WebUI ────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      # ── 2. lumipro 二进制 ────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build lumipro (aarch64-linux-android)
        working-directory: rust
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a --platform 26 build --release

      - name: Copy binary to bin/
        run: |
          cp rust/target/aarch64-linux-android/release/lumipro bin/lumipro
          chmod +x bin/lumipro

      # ── 3. 打包模块 ──────────────────────────────────────────────────────
      - name: Package module
        run: node build-module.js

      # ── 4. 重命名 zip 加入 commit 短哈希 ─────────────────────────────────
      - name: Rename zip with commit hash
        id: names
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          FINAL="LuminPro_${VERSION}-${SHORT_SHA}.zip"
          mv "LuminPro_${VERSION}.zip" "$FINAL"
          echo "zip=$FINAL" >> "$GITHUB_OUTPUT"

      # ── 5. 上传 artifact（单个 zip 文件） ────────────────────────────────
      # upload-artifact 上传单个文件时仍会套一层 zip；通过 gh run download 下载
      # 后得到的即是模块 zip，直接可刷入，无需二次解压。
      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.zip }}
          path: ${{ steps.names.outputs.zip }}
          if-no-files-found: error
