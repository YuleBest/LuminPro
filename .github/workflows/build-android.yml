name: Build & Package Module

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. WebUI ────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      # ── 2. lumipro 二进制 ────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build lumipro (aarch64-linux-android)
        working-directory: rust
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a --platform 26 build --release

      - name: Copy binary to bin/
        run: |
          cp rust/target/aarch64-linux-android/release/lumipro bin/lumipro
          chmod +x bin/lumipro

      # ── 3. 打包模块 ──────────────────────────────────────────────────────
      - name: Package module
        run: node build-module.js

      # ── 4. 解压到暂存目录并命名 artifact ────────────────────────────────
      # upload-artifact 会对上传路径再套一层 zip；通过解压到 staging/ 再上传，
      # 让 upload-artifact 的 zip 本身就是可直接刷入的模块包，避免双重嵌套。
      - name: Prepare staging directory
        id: names
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          ARTIFACT="LuminPro_${VERSION}-${SHORT_SHA}.zip"
          mkdir staging
          cd staging && unzip "../LuminPro_${VERSION}.zip"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      # ── 5. 上传 artifact ─────────────────────────────────────────────────
      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.artifact }}
          path: staging/
          if-no-files-found: error
