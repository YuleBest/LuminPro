<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LuminPro</title>
  <link rel="stylesheet" type="text/css" href="/internal/insets.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- 顶部头 -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-icon"><i data-lucide="sun"></i></div>
        <div class="header-text">
          <h1>LuminPro</h1>
          <p class="header-subtitle" id="module-version">日用屏幕亮度强化</p>
        </div>
      </div>
      <div class="header-status" id="module-status">
        <span class="status-dot"></span>
        <span class="status-text">运行中</span>
      </div>
    </header>

    <!-- 实时状态 -->
    <section class="card" id="status-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="activity"></i></span>
        <h2>实时状态</h2>
        <div class="header-actions">
           <button class="btn-text-s" id="btn-toggle-service">暂停</button>
           <button class="btn-text-s" id="btn-restart-service">重启</button>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-item">
          <span class="status-label">当前亮度</span>
          <span class="status-value" id="status-current-bri">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">系统最大亮度</span>
          <span class="status-value" id="status-sys-max-bri">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">inotifyd PID</span>
          <span class="status-value" id="status-inotifyd-pid">—</span>
        </div>
        <div class="status-item">
          <span class="status-label">休眠状态</span>
          <span class="status-value" id="status-sleep">—</span>
        </div>
      </div>
    </section>

    <!-- 配置卡片 -->
    <section class="card" id="config-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="settings"></i></span>
        <h2>亮度配置</h2>
      </div>

      <!-- 分类: 亮度调节 -->
      <div class="config-group">
        <h3 class="group-title">亮度调节</h3>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">前台最大亮度</span>
            <span class="config-desc">触发亮度提升的阈值</span>
          </div>
          <div class="config-value">
            <input type="number" id="input-ui-max-bri" class="config-input" min="0" />
          </div>
        </div>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">峰值最大亮度</span>
            <span class="config-desc">亮度提升的目标值</span>
          </div>
          <div class="config-value">
            <input type="number" id="input-max-bri" class="config-input" min="0" />
          </div>
        </div>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">亮度提升步数</span>
            <span class="config-desc">约 0.02 秒 / 步</span>
          </div>
          <div class="config-value">
            <input type="number" id="input-steps-num" class="config-input" min="1" max="500" />
          </div>
        </div>
      </div>

      <!-- 分类: 执行策略 -->
      <div class="config-group">
        <h3 class="group-title">执行策略</h3>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">自动亮度时休眠</span>
            <span class="config-desc">开启自动亮度时不提升</span>
          </div>
          <div class="config-value">
            <label class="switch">
              <input type="checkbox" id="input-auto-bri-sleep">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">定时休眠</span>
            <span class="config-desc">设定时段内不提升亮度</span>
          </div>
          <div class="config-value">
            <label class="switch">
              <input type="checkbox" id="input-sleep-mode">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="config-item-expand" id="sleep-time-expand">
          <div class="custom-time-picker">
            <div class="time-unit">
              <input type="number" id="input-sleep-start-h" class="time-input" min="0" max="23" placeholder="00" />
              <span>:</span>
              <input type="number" id="input-sleep-start-m" class="time-input" min="0" max="59" placeholder="00" />
            </div>
            <span class="time-sep">至</span>
            <div class="time-unit">
              <input type="number" id="input-sleep-end-h" class="time-input" min="0" max="23" placeholder="00" />
              <span>:</span>
              <input type="number" id="input-sleep-end-m" class="time-input" min="0" max="59" placeholder="00" />
            </div>
          </div>
        </div>
      </div>

      <!-- 分类: 系统管理 -->
      <div class="config-group">
        <h3 class="group-title">系统管理</h3>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">日志大小限制</span>
            <span class="config-desc">单位: KB</span>
          </div>
          <div class="config-value">
            <input type="number" id="input-log-max-size" class="config-input" min="1" max="10240" />
          </div>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-outline" id="btn-reset">
          恢复默认
        </button>
        <button class="btn btn-primary" id="btn-save">
          <span class="btn-icon"><i data-lucide="save"></i></span> 保存配置
        </button>
      </div>
    </section>

    <!-- 高级设置卡片 -->
    <section class="card" id="advanced-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="sliders"></i></span>
        <h2>高级设置</h2>
      </div>

      <div class="config-group">
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">当前亮度节点</span>
            <span class="config-desc">修改需重启服务</span>
          </div>
          <div class="config-value">
            <input type="text" id="input-now-bri-file" class="config-input config-input-wide" />
          </div>
        </div>
        <div class="config-item">
          <div class="config-label">
            <span class="config-name">最大亮度节点</span>
            <span class="config-desc">修改需重启服务</span>
          </div>
          <div class="config-value">
            <input type="text" id="input-sys-max-bri-file" class="config-input config-input-wide" />
          </div>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-primary" id="btn-save-advanced">
          <span class="btn-icon"><i data-lucide="save"></i></span> 保存设置
        </button>
      </div>
    </section>

    <!-- 日志 -->
    <section class="card" id="log-section">
      <div class="card-header">
        <span class="card-icon"><i data-lucide="file-text"></i></span>
        <h2>运行日志</h2>
      </div>
      <pre class="log-output" id="log-output">加载中...</pre>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
